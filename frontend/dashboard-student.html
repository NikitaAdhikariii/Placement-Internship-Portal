<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard</title>

<style>

body{

font-family:Arial;

background:#f2f6ff;

margin:0;

}



.header{

background:#0072ff;

color:white;

padding:15px;

text-align:center;

font-size:22px;

}



.container{

padding:20px;

}



.job{

background:white;

padding:15px;

margin:10px 0;

border-radius:8px;

box-shadow:0 2px 6px rgba(0,0,0,0.1);

}



button{

padding:8px 15px;

background:#0072ff;

color:white;

border:none;

border-radius:5px;

cursor:pointer;

}



</style>

</head>


<body>


<div class="header">

Student Dashboard

</div>



<div class="container">


<h3>Available Jobs</h3>



<div class="job">

<h4>Software Intern</h4>

<p>Company: Google</p>

<p>Location: Remote</p>

<button>Apply</button>

</div>



<div class="job">

<h4>Web Developer</h4>

<p>Company: Amazon</p>

<p>Location: Bangalore</p>

<button>Apply</button>

</div>



<div class="job">

<h4>Data Analyst</h4>

<p>Company: Microsoft</p>

<p>Location: Hyderabad</p>

<button>Apply</button>

</div>



</div>


</body>

</html>
