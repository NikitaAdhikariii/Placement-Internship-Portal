<!DOCTYPE html>
<html>

<head>
<title>Student Login</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("images/gehu.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 15px black;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px;
width:100%;
background:#003366;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

h2{
color:#003366;
}

.link{
margin-top:10px;
display:block;
color:#003366;
cursor:pointer;
text-decoration:underline;
}

</style>

</head>

<body>

<div class="box">

<h2>Student Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="loginStudent()">Login</button>

<span class="link" onclick="goRegister()">New user? Register</span>

</div>


<script>

async function loginStudent(){

try{

let res = await fetch("http://localhost:5001/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("email").value,

password:document.getElementById("password").value,

role:"student"

})

})

let data = await res.json()

alert(data.message)

if(data.user && data.user.role==="student"){

window.location.href="dashboard-student.html"

}

else{

alert("Invalid login")

}

}

catch{

alert("Server not running")

}

}


function goRegister(){

window.location.href="index.html"

}

</script>

</body>

</html>
