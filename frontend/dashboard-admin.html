<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#232526,#414345);
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
}

.container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:30px;
}

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
width:200px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

h2{
margin:0;
}

</style>

</head>

<body>

<div class="header">Admin Dashboard 📊</div>

<div class="container">

<div class="card">
<h3>Students</h3>
<h2 id="students">0</h2>
</div>

<div class="card">
<h3>Companies</h3>
<h2 id="companies">0</h2>
</div>

<div class="card">
<h3>Jobs</h3>
<h2 id="jobs">0</h2>
</div>

</div>

<script>

async function loadAdmin() {
  const res = await fetch("http://localhost:5001/api/admin/stats");
  const data = await res.json();

  document.getElementById("students").innerText = data.stats.students;
  document.getElementById("companies").innerText = data.stats.companies;
  document.getElementById("jobs").innerText = data.stats.jobs;

  // show jobs list
  console.log("Jobs:", data.jobs);
}
loadAdmin();

</script>

</body>
</html>
